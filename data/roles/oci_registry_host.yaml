---
# Role data for oci_registry_host: the native OCI registry (distribution v3
# binary under launchd) that serves Tart VM images to the
# gecko-t-osx-1500-m-vms tester fleet. See roles_profiles::roles::oci_registry_host.

oci_registry:
  version: 'v3.0.0'
  # distribution `registry` v3 built for darwin/arm64 and published to the ronin
  # package bucket (no official darwin release exists; 2.8.x will not build on
  # current Go). v3 reads the existing v2 on-disk layout, so no data migration.
  # Verified by sha256 on download.
  binary_url: 'https://ronin-puppet-package-repo.s3.us-west-2.amazonaws.com/macos/public/common/registry-v3.0.0-darwin-arm64'
  binary_sha256: '10c708e527bf65e48a2cd9633133e0c411f49d3159c7c84eb87c8fe2526cbfab'
  # Filesystem storage root (existing image data lives here; unchanged from the
  # former Colima bind-mount). delete is enabled so maintenance GC can reclaim.
  registry_dir: '/Users/admin/registry-data'
  registry_port: 5000
  user: admin
  # Push authentication (Bug 2049579 rec #4). Leave push_htpasswd EMPTY here —
  # ronin_puppet is public, so the credential must NOT be committed. Populate it
  # via a secret override (the bcrypt htpasswd body, e.g. `builder:$2y$05$...`
  # from `htpasswd -nbB builder '<password>'`); the plaintext password goes only
  # to the builder's GitHub Actions secret. When set, an nginx proxy requires
  # auth for pushes and the registry binds internal_port (loopback) behind it.
  # Empty = no proxy, registry binds registry_port directly (open push).
  push_htpasswd: ''
  internal_port: 5001
  # http.secret signs upload state; single-node so not sensitive, but override
  # via a secure source if desired.
  http_secret: 'm4-194-oci-registry-shared-secret'
  # Daily maintenance retention: keep the newest N prod-<sha> images, prune
  # transient PR build tags (pr-<n>-<sha>); "*-latest" moving tags always kept.
  # maintenance_hour is the local hour (0-23) the GC job runs.
  keep_prod_shas: 10
  prune_pr_shas: true
  maintenance_hour: 9
  # Health check: alert when the storage volume is at/above this percent full,
  # or /v2/ is unreachable. health_interval is the poll cadence (seconds).
  disk_threshold_pct: 85
  health_interval: 300
  alert_email: releng-ci-alerts@mozilla.com
  smtp_relay: smtp1.mail.mdc1.mozilla.com
